<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="love.css">
    <title>Gửi emmm &#128150;</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <!-- Floating hearts background -->
    <div class="floating-hearts"></div>
    <div class="wrapper">
        <div class="formInput">
            
            <div class="boxHands">
                <div class="handsCat">
                    <img src="../image/handsCat.png" alt="">
                </div>
                <h1>Tiêu đề</h1>
            </div>
            <div class="boxSlider">
                    <div class="listSlider">
                        <div class="slider">
                            <img src="../image/love1.png" alt="">
                        </div>
                        <div class="slider">
                            <img src="../image/love2.png" alt="">
                        </div>

                        <div class="slider">
                            <img src="../image/love3.png" alt="">
                        </div>
                        <div class="slider">
                            <img src="../image/love4.png" alt="">
                        </div>
                        <div class="slider">
                            <img src="../image/love5.png" alt="">
                        </div>
                        <div class="slider">
                            <img src="../image/love6.png" alt="">
                        </div>
                        <div class="slider">
                            <img src="../image/love7.png" alt="">
                        </div>
                        <div class="slider">
                            <img src="../image/love8.png" alt="">
                        </div>
                        <div class="slider">
                            <img src="../image/love9.png" alt="">
                        </div>
                        <div class="slider">
                            <img src="../image/love10.png" alt="">
                        </div>
                    </div>
                <div class="left">
                    <i class="fa-solid fa-chevron-left"></i>
                </div>
                <div class="right">
                    <i class="fa-solid fa-chevron-right"></i>
                </div>
            </div>
            <div class="boxHandsInput">
                <div class="handsCatImgInput">
                    <img src="../image/handsCat.png" alt="">
                </div>
                <input type="text" id="inputField" placeholder="Nhập tên..." readonly>
            </div>
            <div class="buttonLove">
                <div class="cricleBtn"></div>
                <div class="button"></div>
            </div>
        </div>
        <div class="boxLine">
            <div class="country-flag country-russia">
                <img class="flag-img" src="../image/conga.png" alt="Nga" />
                <span class="country-label">Nga</span>
            </div>
            <div class="boxCar">
                <img src="../image/car.gif" alt="">
            </div>
            <div class="boxHeart">
                <div class="heart1"></div>
                <div class="heart2"></div>
                <div class="heart3"></div>
                <div class="heart4"></div>
                <div class="heart5"></div>
                <div class="heart6"></div>
            </div>
            <div class="ground-line">
                <div>
                    <span class="line1"></span>
                    <span class="line2"></span>
                    <span class="line3"></span>
                    <span class="line4"></span>
                    <span class="line5"></span>
                    <span class="line1"></span>
                    <span class="line2"></span>
                    <span class="line3"></span>
                    <span class="line4"></span>
                    <span class="line5"></span>
                </div>
              </div>
            <div class="country-flag country-vietnam">
                <img class="flag-img" src="../image/covn.png" alt="Việt Nam" />
                <span class="country-label">Việt Nam</span>
            </div>
        </div>
    </div>
    <div class="loadingLove">
        <div class="rhombus">
            <div class="circle1"></div>
            <div class="circle2"></div>
        </div>
    </div>

    <div class="wrapperLetterForm">
        <div class="boxLetter">
            <i class="fa-solid fa-xmark"></i>
            <div class="formLetter">
                <div class="heartLetter">
                    <div class="heartLetterItem"></div>
                </div>
                <div class="heartLetter">
                    <div class="heartLetterItem"></div>
                </div>
                
                <div class="wrapperLetter">
                    <div class="giftbox">
                        <div class="img">
                            <img src="../image/giftbox.png" alt="">
                        </div>
                    </div>
                    <div class="textLetter">
                        <h2></h2>
                        <p class="contentLetter"></p>
                        <br>
                        <span class="thuong-em">Thương em pé của anh</span>
                        <div class="heartAnimation">
                            <img src="../image/heartAnimation.gif" alt="">
                        </div>
                    </div>
                    <div class="mewmew1">
                        <img src="../image/mewmew.gif" alt="">
                    </div>
                    <div class="mewmew2">
                        <img src="../image/mewmew.gif" alt="">
                    </div>
                </div>
            </div>
            <div class="before"></div>
        </div>
    </div>

    <!-- Music Player Control -->
    <div id="music-player">
        <audio id="audio-player" src="../music/music1.mp3" autoplay loop></audio>
        <div class="music-controls">
            <button id="prev-music" title="Previous"><i class="fa-solid fa-backward"></i></button>
            <span class="music-heart"><i class="fa-solid fa-heart"></i></span>
            <span id="music-title">music1.mp3</span>
            <button id="next-music" title="Next"><i class="fa-solid fa-forward"></i></button>
        </div>
        <div class="music-sticker">
            <img src="../image/mewmew.gif" alt="cute" />
        </div>
    </div>
</body>
<script type="text/javascript" src="https://code.jquery.com/jquery-3.6.3.min.js"></script>
<script>
    $(window).on('load', function(event){
    $('body').removeClass('preloading');
    $('.loadingLove').delay(1000).fadeOut('fast');

        
    function getHeart(e){
        let ele = document.createElement("div");
        ele.className = "element"
        document.querySelector("body").prepend(ele)
        ele.style.left = e.clientX + 'px';
        ele.style.top = e.clientY -10 +'px';
        setTimeout(()=>{
            let text = document.querySelectorAll(".element")[0],
            directionX = Math.random() < .5 ? -1 : 1,
            directionY = Math.random() < .5 ? -1 : 1

            text.style.left = parseInt(text.style.left) - (directionX * (Math.random() * 100)) + 'px';
            text.style.top = parseInt(text.style.top) - (directionY * (Math.random() * 100)) + 'px';
            text.style.opacity = 0;
            text.style.transform = 'scale(0.4)'
            text.innerHTML = "💗"
            text.style.zIndex = "100"

            setTimeout(()=>{
                ele.remove()
            },1000)
        },10)
    }
    document.onmousemove = function(e){
        getHeart(e)
    }
    document.onclick = function(e){
        let ele = document.createElement("div");
        ele.className = "heartRain"
        document.querySelector("body").prepend(ele);
        ele.style.left = e.clientX -10 + 'px';
        ele.style.top = e.clientY -10 +'px';
        ele.innerHTML = "💗"
        setTimeout(()=>{
            ele.style.top = "calc(85% - 25px)"
        },100)
        setTimeout(()=>{
            ele.style.opacity = 0
        },3000)
        setTimeout(()=>{
            ele.remove()
        },4000)
    }
    document.onmousedown = (e)=>{
        getHeart(e)
    }

    const inputField = document.getElementById('inputField');
    const textToType = "Gửi em! "; 
    const typingSpeed = 100; // milliseconds per character

    let charIndex = 0;
    function typeText() {
        if (charIndex < textToType.length) {
            inputField.value += textToType.charAt(charIndex);
            charIndex++;
            setTimeout(typeText, typingSpeed);
        }
        if(inputField.value.length == textToType.length){
            setTimeout(()=>{
                document.querySelector(".buttonLove").style.transform = "translateY(0%)";
                document.querySelector(".cricleBtn").style.transform = "scale(0.1)"
            },1000)
            setTimeout(()=>{
                document.querySelector(".cricleBtn").style.transform = "scale(1)"
                document.querySelector(".cricleBtn").innerHTML = "💗"
            },2000)
            setTimeout(()=>{
                document.querySelector(".buttonLove").style.width = "120px"
                document.querySelector(".button").style.transform = "translateX(25px)"
            },2500)
            setTimeout(()=>{
                document.querySelector(".button").style.width = "calc(100% - 25px)"
                document.querySelector(".button").style.height = "10px"
            },3000)
            setTimeout(()=>{
                document.querySelector(".button").style.height = "30px"
                document.querySelector(".button").style.width = "220px";
                document.querySelector(".button").style.fontSize = "18px";
            },3500)
            setTimeout(()=>{
                document.querySelector(".button").innerHTML = "Gửi em chút tình yêuuu ❤️"
                shakeButton();
            },4000)
        }
    }

    setTimeout(()=>{
        typeText();
    }, 11500)
    });

    let indexText = 0;
    let textLetter = document.querySelector('.textLetter h2');
    const textLetterH2 = "Gửi em!";
    let timoutTextLetter;

    function textCharLetter(){
        if (indexText < textLetterH2.length) {
            textLetter.textContent += textLetterH2[indexText];
            indexText++;
            setTimeout(indexText, 100);
        }
        else{
            clearInterval(timoutTextLetter);
            setTimeout(()=>{
                funcTimeoutLetterContent()
            },500)
        }
    }
    function funcTimeoutLetter(){
        indexText = 0;
        textLetter.textContent = ''; 
        clearInterval(timoutTextLetter);
        timoutTextLetter =  setInterval(()=>{
                textCharLetter();
            }, 200)
    }

    // chữ của thư bạn muốn gửi
    let indexTextContent = 0;
    let textLetterContent = document.querySelector('.contentLetter');
    // thay đổi lời chúc
    const textLetterP = "Chúng mình đi cùng nhau đoạn đường cũng là dài rồi á nhỉ :P. Chúc hai đứa mình có thể cùng nhau đi đến cuối đời, cùng mang lại hạnh phúc cho nhau em nhéeee! ";
    let timoutTextLetterContent;
    function textCharLetterContent(){
        if (indexTextContent < textLetterP.length) {
            textLetterContent.textContent += textLetterP[indexTextContent];
            indexTextContent++;
            setTimeout(indexTextContent, 100);
        }
        else{
            clearInterval(timoutTextLetterContent)

        }
    }
    function funcTimeoutLetterContent(){
        indexTextContent = 0; 
        textLetterContent.textContent = ''; 
        clearInterval(timoutTextLetterContent);
        timoutTextLetterContent =  setInterval(()=>{
            textCharLetterContent();
            }, 100)
    }
    //end 
    document.querySelector(".boxSlider .right").addEventListener("click", function(){
        var slider = document.querySelectorAll(".slider")
        document.querySelector(".listSlider").appendChild(slider[0])
    })
    document.querySelector(".boxSlider .left").addEventListener("click", function(){
        var slider = document.querySelectorAll(".slider")
        document.querySelector(".listSlider").prepend(slider[slider.length -1])
    })

    document.querySelector(".buttonLove").addEventListener("click", function(){
        let timeout = setInterval(()=>{
            var letters = document.createElement("div");
            letters.className = "letters"
            letters.innerHTML = '<img src="../image/letters.png" alt="">';
            document.querySelector("body").prepend(letters)
            let left = Math.floor(Math.random() * 100);
            let rotate = Math.floor(Math.random() * 360);
            letters.style.left = left + "%";
            letters.style.top = "-10%";
            letters.style.transform = `rotate(${rotate}deg)`;
            setTimeout(()=>{
                letters.style.top = "100%";
            },1000)
            setTimeout(()=>{
                letters.remove()
            },11000)
            document.querySelectorAll(".letters").forEach((item)=>{
                item.addEventListener("click", function(){
                    clearInterval(timeout)
                    $(".wrapperLetterForm").fadeIn()
                    funcTimeoutLetter();
                    
                })
            })
        },500)
    })

    document.querySelector(".fa-xmark").addEventListener("click", function(){
        indexTextContent = 0; 
        textLetterContent.textContent = '';
        clearInterval(timoutTextLetterContent)
        $(".wrapperLetterForm").fadeOut()
    })

    // Floating hearts background
    function createFloatingHeart() {
        const heart = document.createElement('div');
        heart.className = 'floating-heart';
        heart.innerHTML = '💗';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.fontSize = (18 + Math.random() * 18) + 'px';
        heart.style.animationDuration = (6 + Math.random() * 4) + 's';
        document.querySelector('.floating-hearts').appendChild(heart);
        setTimeout(() => heart.remove(), 9000);
    }
    setInterval(createFloatingHeart, 700);

    function shakeButton() {
        const btn = document.querySelector(".buttonLove .button");
        btn.classList.add("shake");
        setTimeout(() => btn.classList.remove("shake"), 800);
    }

    document.querySelector(".buttonLove .button").addEventListener("click", function() {
        shakeButton();
    });

    setInterval(function() {
        var slider = document.querySelectorAll(".slider");
        if (slider.length > 0) {
            document.querySelector(".listSlider").appendChild(slider[0]);
        }
    }, 2500);

    const musicFiles = [
        "../music/music1.mp3",
        "../music/music2.mp3",
        "../music/music3.mp3",
        "../music/music4.mp3",
        "../music/music5.mp3",
        "../music/music6.mp3"
    ];
    let currentMusic = 0;
    const audioPlayer = document.getElementById("audio-player");
    const musicTitle = document.getElementById("music-title");
    const prevBtn = document.getElementById("prev-music");
    const nextBtn = document.getElementById("next-music");
    const heartIcon = document.querySelector(".music-heart i");

    function getQueryParam(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }
    if (getQueryParam('autoplay') === '1') {
        audioPlayer.autoplay = true;
        audioPlayer.muted = false;
        setTimeout(() => {
            audioPlayer.play();
        }, 100);
    }

    function setMusic(index) {
        currentMusic = index;
        audioPlayer.src = musicFiles[currentMusic];
        audioPlayer.load();
        audioPlayer.muted = false;
        audioPlayer.play().catch(() => {
            document.body.addEventListener('click', playOnUserGesture, { once: true });
        });
        musicTitle.textContent = musicFiles[currentMusic].split('/').pop();
        heartIcon.classList.add("music-heart-animate");
        setTimeout(() => heartIcon.classList.remove("music-heart-animate"), 700);
    }

    function playOnUserGesture() {
        audioPlayer.muted = false;
        audioPlayer.play().catch(()=>{});
    }

    nextBtn.onclick = function() {
        currentMusic = (currentMusic + 1) % musicFiles.length;
        setMusic(currentMusic);
        nextBtn.classList.add("music-btn-animate");
        setTimeout(() => nextBtn.classList.remove("music-btn-animate"), 400);
    };
    prevBtn.onclick = function() {
        currentMusic = (currentMusic - 1 + musicFiles.length) % musicFiles.length;
        setMusic(currentMusic);
        prevBtn.classList.add("music-btn-animate");
        setTimeout(() => prevBtn.classList.remove("music-btn-animate"), 400);
    };

    audioPlayer.onended = function() {
        currentMusic = (currentMusic + 1) % musicFiles.length;
        setMusic(currentMusic);
    };

    setMusic(currentMusic);

    if (getQueryParam('autoplay') === '1') {
        window.addEventListener('load', function() {
            setTimeout(function() {
                audioPlayer.muted = false;
                audioPlayer.play().catch(() => {
                    document.body.addEventListener('click', playOnUserGesture, { once: true });
                });
            }, 300);
        });
    }
</script>
<style>
.shake {
    animation: shakeBtn 0.8s;
}
@keyframes shakeBtn {
    0% { transform: translateX(0);}
    20% { transform: translateX(-6px);}
    40% { transform: translateX(6px);}
    60% { transform: translateX(-4px);}
    80% { transform: translateX(4px);}
    100% { transform: translateX(0);}
}

#music-player {
    position: fixed;
    right: 18px;
    bottom: 18px;
    z-index: 9999;
    background: linear-gradient(135deg, #ffd6e6 60%, #ffb7e4 100%);
    border-radius: 22px;
    box-shadow: 0 4px 24px #ea4c8955, 0 0 0 4px #fff6fa;
    padding: 14px 24px 14px 18px;
    display: flex;
    align-items: center;
    font-family: 'Dancing Script', 'Roboto', cursive, sans-serif;
    min-width: 210px;
    border: 2px solid #ea4c89;
    animation: musicFadeIn 1.2s;
}
@keyframes musicFadeIn {
    0% { opacity: 0; transform: scale(0.7);}
    100% { opacity: 1; transform: scale(1);}
}
#music-player .music-controls {
    display: flex;
    align-items: center;
    gap: 12px;
}
#music-player button {
    background: #ea4c89;
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 34px;
    height: 34px;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 2px 8px #fd89c3;
    transition: background 0.2s, transform 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
}
#music-player button:hover {
    background: #fd89c3;
    transform: scale(1.15) rotate(-8deg);
}
.music-btn-animate {
    animation: btnPop 0.4s;
}
@keyframes btnPop {
    0% { transform: scale(1) rotate(0);}
    50% { transform: scale(1.25) rotate(12deg);}
    100% { transform: scale(1) rotate(0);}
}
.music-heart {
    color: #ea4c89;
    font-size: 22px;
    margin: 0 4px;
    position: relative;
    animation: heartPulse 2s infinite;
}
.music-heart-animate {
    animation: heartJump 0.7s;
}
@keyframes heartJump {
    0% { transform: scale(1);}
    30% { transform: scale(1.5) rotate(-10deg);}
    60% { transform: scale(1.2) rotate(10deg);}
    100% { transform: scale(1);}
}
#music-title {
    font-size: 16px;
    font-weight: 700;
    color: #ea4c89;
    max-width: 100px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    text-align: center;
    background: #fff6fa;
    border-radius: 8px;
    padding: 2px 8px;
    margin: 0 2px;
    box-shadow: 0 1px 4px #ffd6e6;
    letter-spacing: 1px;
}
#audio-player {
    display: none;
}
.music-sticker {
    position: absolute;
    right: -18px;
    bottom: -18px;
    width: 44px;
    height: 44px;
    z-index: 2;
    pointer-events: none;
}
.music-sticker img {
    width: 100%;
    filter: drop-shadow(0 0 8px #ea4c89);
    border-radius: 50%;
    border: 2px solid #ffb7e4;
    background: #fff6fa;
    animation: stickerBounce 2.2s infinite;
}
@keyframes stickerBounce {
    0%,100% { transform: translateY(0);}
    50% { transform: translateY(-8px);}
}

.country-flag {
    position: absolute;
    bottom: 10%;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 10;
    font-family: 'Dancing Script', cursive;
    font-size: 28px;
    font-weight: bold;
    text-shadow: 0 0 8px #ffd6e6;
    pointer-events: none;
}
.country-russia {
    left: 0;
}
.country-vietnam {
    right: 0;
}
.flag-img {
    width: 54px;
    height: 38px;
    object-fit: contain;
    margin-bottom: 4px;
    border-radius: 8px;
    box-shadow: 0 0 8px #ea4c89;
    background: #fff6fa;
}
.country-label {
    font-size: 18px;
    color: #ea4c89;
    background: #fff6fa;
    border-radius: 8px;
    padding: 2px 10px;
    margin-top: -2px;
    box-shadow: 0 1px 4px #ffd6e6;
}
@media (max-width: 900px) {
    .country-flag {
        font-size: 18px;
    }
    .flag-img {
        width: 32px;
        height: 22px;
    }
    .country-label {
        font-size: 13px;
        padding: 2px 6px;
    }
}
</style>
</html>
